<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Population Demo</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <main class="app">
      <h1>Mock Population Generator</h1>
      <p>Upload DD.csv, nonempty.json, and config.json to generate outputs in-browser.</p>
      <form id="generator-form" class="panel">
        <label>DD.csv <input id="dd-file" type="file" accept=".csv,text/csv" required /></label>
        <label>nonempty.json <input id="nonempty-file" type="file" accept=".json,application/json" required /></label>
        <label>config.json <input id="config-file" type="file" accept=".json,application/json" required /></label>
        <label>Seed override (optional) <input id="seed-input" type="number" min="0" step="1" /></label>
        <button type="submit">Generate and Download ZIP</button>
      </form>
      <pre id="status" class="status">Idle.</pre>
    </main>
  </body>
</html>
